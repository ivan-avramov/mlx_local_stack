mlx_port: 8091                    # Internal port used by the active mlx subprocess
manager_port: 8000                # Port the FastAPI manager listens on
inactivity_timeout_seconds: 10800   # Unload model after x seconds of no requests
startup_timeout_seconds: 300      # Max wait for model to become READY

models:
  - name: gemma-4-26b-moe-4-256
    type: vision
    on_demand: true
    hf_path: mlx-community/gemma-4-26b-a4b-it-4bit
    max_kv_cache_size: 262144
    kv_quant_scheme: uniform
    kv_bits: 4
    prefill_step_size: 512
    quantized_kv_start: 0

